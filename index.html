<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的读书系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --ink: #1a1814;
    --ink-muted: #6b6560;
    --ink-faint: #c4bfb8;
    --paper: #f7f4ee;
    --paper-warm: #ede9e0;
    --paper-card: #faf8f4;
    --accent: #c4622d;
    --accent-soft: #f0e4d8;
    --accent-green: #3d6b4f;
    --accent-green-soft: #ddeae2;
    --accent-blue: #2d5a8e;
    --accent-blue-soft: #dce8f5;
    --border: rgba(26,24,20,0.1);
    --border-strong: rgba(26,24,20,0.2);
    --shadow: 0 2px 12px rgba(26,24,20,0.08);
    --shadow-lg: 0 8px 32px rgba(26,24,20,0.12);
    --serif: 'Instrument Serif', 'Noto Serif SC', serif;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Serif SC', serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── Login Screen ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 40px;
    background: var(--paper);
    position: relative;
    overflow: hidden;
  }

  #login-screen::before {
    content: '';
    position: absolute;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(196,98,45,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  #login-screen::after {
    content: '';
    position: absolute;
    bottom: -150px; left: -150px;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(61,107,79,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-logo {
    text-align: center;
    animation: fadeUp 0.8s ease both;
  }

  .login-logo .en {
    font-family: var(--serif);
    font-size: 13px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .login-logo h1 {
    font-family: var(--serif);
    font-size: 48px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.1;
  }

  .login-logo .sub {
    margin-top: 12px;
    font-size: 14px;
    color: var(--ink-muted);
    font-style: italic;
  }

  .login-card {
    background: var(--paper-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 40px;
    text-align: center;
    width: 360px;
    box-shadow: var(--shadow-lg);
    animation: fadeUp 0.8s 0.2s ease both;
  }

  .login-card p {
    font-size: 14px;
    color: var(--ink-muted);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 12px 20px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .google-btn:hover {
    background: #2d2a25;
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }

  .google-btn svg { flex-shrink: 0; }

  /* ── App Layout ── */
  #app { display: none; min-height: 100vh; }

  header {
    background: var(--paper-card);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-brand {
    font-family: var(--serif);
    font-size: 20px;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-brand span {
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-family: var(--mono);
  }

  .header-user {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--ink-muted);
  }

  .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent-soft);
    border: 1px solid var(--border);
    object-fit: cover;
  }

  nav {
    display: flex;
    gap: 4px;
  }

  nav button {
    background: none;
    border: none;
    padding: 6px 16px;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  nav button:hover { background: var(--paper-warm); color: var(--ink); }
  nav button.active { background: var(--paper-warm); color: var(--ink); font-weight: 600; }

  main {
    max-width: 1000px;
    margin: 0 auto;
    padding: 40px 40px 80px;
  }

  /* ── Stat Cards ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }

  .stat-card {
    background: var(--paper-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    animation: fadeUp 0.5s ease both;
  }

  .stat-card:nth-child(2) { animation-delay: 0.05s; }
  .stat-card:nth-child(3) { animation-delay: 0.1s; }

  .stat-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    font-family: var(--mono);
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: var(--serif);
    font-size: 36px;
    color: var(--ink);
    line-height: 1;
  }

  .stat-sub {
    font-size: 12px;
    color: var(--ink-muted);
    margin-top: 4px;
  }

  /* ── Section titles ── */
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    color: var(--ink);
  }

  .section-meta {
    font-size: 12px;
    color: var(--ink-muted);
    font-family: var(--mono);
  }

  /* ── Tabs ── */
  .tab { display: none; }
  .tab.active { display: block; animation: fadeUp 0.4s ease both; }

  /* ── Philosophy entries ── */
  .entries-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .entry-card {
    background: var(--paper-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    transition: box-shadow 0.2s;
    cursor: default;
  }

  .entry-card:hover { box-shadow: var(--shadow); }

  .entry-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 10px;
  }

  .entry-quote {
    font-family: var(--serif);
    font-size: 17px;
    color: var(--ink);
    line-height: 1.5;
    flex: 1;
  }

  .entry-quote::before { content: '"'; color: var(--accent); }
  .entry-quote::after  { content: '"'; color: var(--accent); }

  .entry-reaction {
    flex-shrink: 0;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: var(--mono);
    white-space: nowrap;
  }

  .reaction-agree    { background: var(--accent-green-soft); color: var(--accent-green); }
  .reaction-partial  { background: #fdf3d8; color: #8a6a00; }
  .reaction-disagree { background: #fde8e8; color: #a33; }
  .reaction-test     { background: var(--accent-blue-soft); color: var(--accent-blue); }

  .entry-application {
    font-size: 13px;
    color: var(--ink-muted);
    margin-bottom: 10px;
    padding-left: 12px;
    border-left: 2px solid var(--accent-soft);
    line-height: 1.6;
  }

  .entry-application::before { content: '→ '; color: var(--accent); font-weight: 600; }

  .entry-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--paper-warm);
    color: var(--ink-muted);
    font-family: var(--mono);
  }

  .entry-source {
    font-size: 11px;
    color: var(--ink-faint);
    font-family: var(--mono);
  }

  /* ── Glossary ── */
  .glossary-category { margin-bottom: 32px; }

  .cat-title {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: var(--mono);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .glossary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  .term-card {
    background: var(--paper-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    transition: box-shadow 0.2s;
  }

  .term-card:hover { box-shadow: var(--shadow); }

  .term-en {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 2px;
  }

  .term-zh {
    font-size: 15px;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .term-def {
    font-size: 12px;
    color: var(--ink-muted);
    line-height: 1.5;
  }

  .term-source {
    margin-top: 6px;
    font-size: 11px;
    color: var(--ink-faint);
    font-family: var(--mono);
  }

  /* ── Reading list ── */
  .book-list { display: flex; flex-direction: column; gap: 10px; }

  .book-card {
    background: var(--paper-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 22px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    transition: box-shadow 0.2s;
  }

  .book-card:hover { box-shadow: var(--shadow); }

  .book-spine {
    width: 36px;
    height: 52px;
    border-radius: 3px;
    background: var(--accent-soft);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-size: 18px;
    color: var(--accent);
    border: 1px solid rgba(196,98,45,0.15);
  }

  .book-info { flex: 1; }

  .book-title {
    font-family: var(--serif);
    font-size: 16px;
    color: var(--ink);
    margin-bottom: 2px;
  }

  .book-author {
    font-size: 12px;
    color: var(--ink-muted);
    font-family: var(--mono);
    margin-bottom: 6px;
  }

  .book-why {
    font-size: 13px;
    color: var(--ink-muted);
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .book-tags {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .priority-high   { background: #fde8d8; color: #8a3500; }
  .priority-medium { background: #fdf3d8; color: #8a6a00; }
  .priority-low    { background: var(--paper-warm); color: var(--ink-muted); }

  .status-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: var(--mono);
    background: var(--accent-green-soft);
    color: var(--accent-green);
  }

  .status-unread { background: var(--paper-warm); color: var(--ink-muted); }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-muted);
  }

  .empty-icon {
    font-family: var(--serif);
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty h3 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 20px;
    margin-bottom: 8px;
  }

  .empty p { font-size: 13px; line-height: 1.6; }

  /* ── Loading ── */
  #loading {
    position: fixed; inset: 0;
    background: var(--paper);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 999;
  }

  .loading-text {
    font-family: var(--serif);
    font-size: 18px;
    color: var(--ink-muted);
    font-style: italic;
    animation: pulse 1.5s ease infinite;
  }

  .loading-bar {
    width: 120px;
    height: 1px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .loading-bar::after {
    content: '';
    position: absolute;
    left: -40%;
    top: 0;
    width: 40%;
    height: 100%;
    background: var(--accent);
    animation: slide 1.2s ease infinite;
  }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  @keyframes slide {
    0%   { left: -40%; }
    100% { left: 100%; }
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    header { padding: 0 16px; }
    main { padding: 24px 16px 60px; }
    .stats { grid-template-columns: 1fr 1fr; }
    .stats .stat-card:last-child { grid-column: span 2; }
    .login-card { width: 90%; padding: 28px 24px; }
    .login-logo h1 { font-size: 36px; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="loading-text">读取中…</div>
  <div class="loading-bar"></div>
</div>

<!-- Login -->
<div id="login-screen" style="display:none;">
  <div class="login-logo">
    <div class="en">Personal Reading System</div>
    <h1>我的读书系统</h1>
    <p class="sub">知识沉淀 · 哲学生长</p>
  </div>
  <div class="login-card">
    <p>用 Google 账号登录，<br>读取你存在 Google Drive 的哲学档案。</p>
    <button class="google-btn" onclick="signIn()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#fff" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#fff" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#fff" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#fff" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      使用 Google 账号登录
    </button>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:20px;">
      <div class="header-brand">
        我的读书系统
        <span>Beta</span>
      </div>
      <nav>
        <button class="active" onclick="switchTab('philosophy', this)">哲学档案</button>
        <button onclick="switchTab('glossary', this)">术语库</button>
        <button onclick="switchTab('reading', this)">推荐书单</button>
      </nav>
    </div>
    <div class="header-user">
      <img class="avatar" id="user-avatar" src="" alt="avatar">
      <span id="user-name"></span>
      <button onclick="signOut()" style="background:none;border:none;font-size:12px;color:var(--ink-muted);cursor:pointer;margin-left:4px;">退出</button>
    </div>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">洞见总数</div>
        <div class="stat-value" id="stat-entries">0</div>
        <div class="stat-sub">条记录</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">术语数量</div>
        <div class="stat-value" id="stat-terms">0</div>
        <div class="stat-sub">个词条</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">推荐书单</div>
        <div class="stat-value" id="stat-books">0</div>
        <div class="stat-sub">本待读</div>
      </div>
    </div>

    <!-- Philosophy Tab -->
    <div id="tab-philosophy" class="tab active">
      <div class="section-header">
        <div class="section-title">哲学档案</div>
        <div class="section-meta" id="phil-updated"></div>
      </div>
      <div class="filter-bar" id="phil-filters"></div>
      <div class="entries-grid" id="entries-container">
        <div class="empty">
          <div class="empty-icon">∅</div>
          <h3>还没有洞见</h3>
          <p>在 Claude 里和书对谈，说"记录"<br>就会自动出现在这里。</p>
        </div>
      </div>
    </div>

    <!-- Glossary Tab -->
    <div id="tab-glossary" class="tab">
      <div class="section-header">
        <div class="section-title">术语库</div>
        <div class="section-meta" id="gloss-count"></div>
      </div>
      <div id="glossary-container">
        <div class="empty">
          <div class="empty-icon">α</div>
          <h3>术语库还是空的</h3>
          <p>讨论书中概念时，Claude 会自动<br>整理中英文术语到这里。</p>
        </div>
      </div>
    </div>

    <!-- Reading List Tab -->
    <div id="tab-reading" class="tab">
      <div class="section-header">
        <div class="section-title">推荐书单</div>
        <div class="section-meta" id="reading-count"></div>
      </div>
      <div class="book-list" id="reading-container">
        <div class="empty">
          <div class="empty-icon">📚</div>
          <h3>书单还是空的</h3>
          <p>Claude 会根据你的阅读内容<br>推荐相关书目到这里。</p>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const CLIENT_ID = '982878152406-b8anluip0bj1f8jj75ncg076m7g6gsv3.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';

const FILE_IDS = {
  philosophy: '1XHmw17iOj0M1AeGpkpzSSLdSRxC6MLwa',
  glossary:   '1dLHfVsmn5DFxUX-HlZTyA0a5p4bfKkz0',
  reading:    '1Zlq7mOmDG4hPSl4ltossGUcFwaBiQX9R',
};

let tokenClient, accessToken = null;
let data = { philosophy: null, glossary: null, reading: null };
let activeTagFilter = 'all';

// ── Boot ──
window.onload = () => {
  const saved = sessionStorage.getItem('gtoken');
  if (saved) {
    accessToken = saved;
    showApp();
    loadAllData();
  } else {
    hide('loading');
    show('login-screen');
  }
};

// ── Auth ──
function signIn() {
  if (!tokenClient) {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: (resp) => {
        if (resp.error) return;
        accessToken = resp.access_token;
        sessionStorage.setItem('gtoken', accessToken);
        hide('login-screen');
        show('app');
        loadUserProfile();
        loadAllData();
      }
    });
  }
  tokenClient.requestAccessToken();
}

function signOut() {
  sessionStorage.removeItem('gtoken');
  accessToken = null;
  hide('app');
  show('login-screen');
}

async function loadUserProfile() {
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const u = await r.json();
    document.getElementById('user-name').textContent = u.name || u.email;
    if (u.picture) document.getElementById('user-avatar').src = u.picture;
  } catch(e) {}
}

// ── Data Loading ──
async function loadAllData() {
  show('loading');
  try {
    await Promise.all([
      loadFile('philosophy', FILE_IDS.philosophy),
      FILE_IDS.glossary ? loadFile('glossary', FILE_IDS.glossary) : Promise.resolve(),
      FILE_IDS.reading  ? loadFile('reading',  FILE_IDS.reading)  : Promise.resolve(),
    ]);
  } catch(e) { console.error(e); }
  hide('loading');
  renderAll();
}

async function loadFile(type, fileId) {
  if (!fileId) return;
  try {
    const r = await fetch(
      `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    data[type] = await r.json();
  } catch(e) { console.error(`Failed to load ${type}:`, e); }
}

// ── Render ──
function renderAll() {
  renderStats();
  renderPhilosophy();
  renderGlossary();
  renderReadingList();
}

function renderStats() {
  const entries = data.philosophy?.entries?.length || 0;
  const terms   = countTerms();
  const books   = data.reading?.books?.length || 0;
  document.getElementById('stat-entries').textContent = entries;
  document.getElementById('stat-terms').textContent   = terms;
  document.getElementById('stat-books').textContent   = books;
}

function countTerms() {
  if (!data.glossary?.categories) return 0;
  return Object.values(data.glossary.categories).flat().length;
}

function renderPhilosophy() {
  const phil = data.philosophy;
  if (!phil?.entries?.length) return;

  const updated = phil.last_updated
    ? `最后更新 ${phil.last_updated}` : '';
  document.getElementById('phil-updated').textContent = updated;

  // Build tag filters
  const tags = [...new Set(phil.entries.map(e => e.value_tag).filter(Boolean))];
  const filterBar = document.getElementById('phil-filters');
  filterBar.innerHTML = `<button class="filter-btn ${activeTagFilter==='all'?'active':''}" onclick="filterTag('all')">全部</button>` +
    tags.map(t => `<button class="filter-btn ${activeTagFilter===t?'active':''}" onclick="filterTag('${t}')">${t}</button>`).join('');

  const filtered = activeTagFilter === 'all'
    ? phil.entries
    : phil.entries.filter(e => e.value_tag === activeTagFilter);

  const container = document.getElementById('entries-container');
  if (!filtered.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">∅</div><h3>没有这个分类的记录</h3></div>`;
    return;
  }

  container.innerHTML = [...filtered].reverse().map(e => `
    <div class="entry-card">
      <div class="entry-top">
        <div class="entry-quote">${esc(e.quote_or_idea || '')}</div>
        <span class="entry-reaction ${reactionClass(e.user_reaction)}">${reactionLabel(e.user_reaction)}</span>
      </div>
      ${e.personal_application ? `<div class="entry-application">${esc(e.personal_application)}</div>` : ''}
      <div class="entry-meta">
        ${e.value_tag ? `<span class="tag">${esc(e.value_tag)}</span>` : ''}
        <span class="entry-source">${esc(e.book||'')} ${e.page?'· '+e.page:''} ${e.date?'· '+e.date:''}</span>
      </div>
    </div>
  `).join('');
}

function filterTag(tag) {
  activeTagFilter = tag;
  renderPhilosophy();
}

function renderGlossary() {
  const gloss = data.glossary;
  if (!gloss?.categories) return;

  const total = countTerms();
  document.getElementById('gloss-count').textContent = `${total} 个词条`;

  const container = document.getElementById('glossary-container');
  const cats = Object.entries(gloss.categories).filter(([,terms]) => terms.length > 0);
  if (!cats.length) return;

  container.innerHTML = cats.map(([cat, terms]) => `
    <div class="glossary-category">
      <div class="cat-title">${esc(cat)}</div>
      <div class="glossary-grid">
        ${terms.map(t => `
          <div class="term-card">
            <div class="term-en">${esc(t.en||'')}</div>
            <div class="term-zh">${esc(t.zh||'')}</div>
            <div class="term-def">${esc(t.definition_zh||'')}</div>
            ${t.source_book ? `<div class="term-source">${esc(t.source_book)} ${t.page||''}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function renderReadingList() {
  const reading = data.reading;
  if (!reading?.books?.length) return;

  document.getElementById('reading-count').textContent = `${reading.books.length} 本`;

  const container = document.getElementById('reading-container');
  container.innerHTML = reading.books.map((b, i) => `
    <div class="book-card" style="animation: fadeUp 0.4s ${i*0.05}s ease both;">
      <div class="book-spine">${(b.title||'?')[0]}</div>
      <div class="book-info">
        <div class="book-title">${esc(b.title||'')}${b.zh_title?` <span style="font-size:13px;color:var(--ink-muted);">· ${esc(b.zh_title)}</span>`:''}</div>
        <div class="book-author">${esc(b.author||'')} ${b.language?'· '+esc(b.language):''}</div>
        ${b.why_recommended ? `<div class="book-why">${esc(b.why_recommended)}</div>` : ''}
        <div class="book-tags">
          <span class="tag ${priorityClass(b.priority)}">${esc(b.priority||'')}</span>
          <span class="tag ${b.status==='未读'?'status-unread':'status-badge'}">${esc(b.status||'未读')}</span>
          ${b.category ? `<span class="tag">${esc(b.category)}</span>` : ''}
          ${b.triggered_by ? `<span class="entry-source">来自 ${esc(b.triggered_by)}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

// ── Tab switching ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  btn.classList.add('active');
}

// ── Show app (already authed) ──
function showApp() {
  hide('loading');
  hide('login-screen');
  show('app');
  loadUserProfile();
}

// ── Helpers ──
function show(id) { document.getElementById(id).style.display = ''; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function reactionClass(r) {
  return { agree:'reaction-agree', 'partially agree':'reaction-partial',
           disagree:'reaction-disagree', 'want to test':'reaction-test' }[r] || 'reaction-test';
}
function reactionLabel(r) {
  return { agree:'认同', 'partially agree':'部分认同',
           disagree:'不认同', 'want to test':'待验证' }[r] || r || '';
}
function priorityClass(p) {
  if (!p) return '';
  if (p.includes('高')) return 'priority-high';
  if (p.includes('中')) return 'priority-medium';
  return 'priority-low';
}
</script>
